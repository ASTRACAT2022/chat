[build]
  base = "frontend/"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/api/*"
  to = "https://astrachat-api.onrender.com/api/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/socket.io/*"
  to = "https://astrachat-api.onrender.com/socket.io/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
