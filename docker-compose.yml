services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: astrachat
      POSTGRES_PASSWORD: astrachat_secret
      POSTGRES_DB: astrachat
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrachat"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://astrachat:astrachat_secret@db:5432/astrachat
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - astracat-protect

networks:
  astracat-protect:
    external: true

volumes:
  pgdata:
